<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Ramz-X | الرئيسية المتقدمة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #777777;
            --accent: #ff0050;
            --accent-blue: #3b82f6;
            --accent-orange: #ff7b00;
            --green: #25D366;
            --red: #ff4444;
            --border: #2c2c2c;
            --radius: 1rem;
        }

        body.light {
            --bg-primary: #f5f5f5;
            --bg-card: #ffffff;
            --bg-input: #e8e8e8;
            --text-primary: #111111;
            --text-secondary: #444444;
            --text-muted: #666666;
            --border: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding-bottom: 70px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            animation: pageIn 0.4s ease;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: var(--bg-input);
        }

        /* ========== شريط الستوري في الأعلى (تحت الهيدر مباشرة) ========== */
        .stories-top-bar {
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 57px;
            z-index: 98;
            padding: 8px 0 4px 0;
        }

        .stories-row {
            display: flex;
            gap: 12px;
            padding: 4px 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            max-width: 600px;
            margin: 0 auto;
        }

        .stories-row::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            flex: 0 0 auto;
            width: 68px;
            text-align: center;
            cursor: pointer;
            scroll-snap-align: start;
            transition: transform 0.2s;
        }

        .story-item:active {
            transform: scale(0.95);
        }

        .story-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, var(--accent), var(--accent-blue), var(--accent-orange));
            margin: 0 auto 4px;
            transition: 0.2s;
        }

        .story-ring:hover {
            transform: scale(1.05);
        }

        .story-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-primary);
        }

        .story-username {
            font-size: 10px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 68px;
        }

        .story-add .story-ring {
            background: var(--bg-input);
            border: 2px dashed var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--accent);
            background: rgba(255, 0, 80, 0.05);
        }

        .story-viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .story-viewer-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .story-viewer-overlay img,
        .story-viewer-overlay video {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 12px;
            object-fit: contain;
        }

        .story-viewer-close {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2600;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-viewer-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 28px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-viewer-prev { left: 10px; }
        .story-viewer-next { right: 10px; }

        .story-progress-bar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            z-index: 2600;
            overflow: hidden;
        }

        .story-progress-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        /* تبويبات متابعين / استكشاف (تحت الستوري) */
        .feed-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 127px;
            background: var(--bg-primary);
            z-index: 97;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .feed-tabs::-webkit-scrollbar {
            display: none;
        }

        .feed-tab {
            flex: 1;
            padding: 10px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            white-space: nowrap;
            background: none;
            font-family: 'Cairo', sans-serif;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .feed-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px;
        }

        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.2s;
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-card:nth-child(1) { animation-delay: 0s; }
        .post-card:nth-child(2) { animation-delay: 0.05s; }
        .post-card:nth-child(3) { animation-delay: 0.1s; }
        .post-card:nth-child(4) { animation-delay: 0.15s; }
        .post-card:nth-child(5) { animation-delay: 0.2s; }

        .post-card:active {
            transform: scale(0.99);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
        }

        .author-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            background: var(--bg-input);
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .author-avatar:hover {
            border-color: var(--accent);
        }

        .author-info {
            flex: 1;
            min-width: 0;
        }

        .author-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .author-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .verified-badge {
            color: var(--accent-blue);
            font-size: 11px;
        }

        .follow-btn {
            background: rgba(255, 0, 80, 0.15);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 11px;
            cursor: pointer;
            color: var(--accent);
            font-weight: 700;
            transition: 0.2s;
            white-space: nowrap;
            font-family: 'Cairo', sans-serif;
        }

        .follow-btn.following {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }

        .follow-btn.unfollow {
            background: rgba(255, 0, 0, 0.15);
            border-color: var(--red);
            color: var(--red);
        }

        .follow-btn:active {
            transform: scale(0.95);
        }

        .post-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .post-menu-btn:hover {
            background: var(--bg-input);
        }

        .post-date {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            cursor: pointer;
            background: var(--bg-input);
            transition: 0.3s;
        }

        .post-image:active {
            opacity: 0.9;
        }

        .post-content {
            padding: 12px;
        }

        .post-title {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 6px;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .category-badge {
            font-size: 10px;
            background: var(--bg-input);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-right: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }

        .category-badge:hover {
            background: var(--accent);
            color: white;
        }

        .post-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 6px;
            max-height: 80px;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .post-text.expanded {
            max-height: none;
        }

        .more-btn {
            color: var(--accent);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
            transition: 0.2s;
        }

        .more-btn:hover {
            color: white;
        }

        .hashtag {
            color: var(--accent);
            font-size: 12px;
            margin-top: 4px;
            cursor: pointer;
            background: rgba(255, 0, 80, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            transition: 0.2s;
        }

        .hashtag:hover {
            background: var(--accent);
            color: white;
        }

        .actions-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 4px;
            border-top: 0.5px solid var(--border);
            background: var(--bg-card);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            background: transparent;
            transition: 0.15s;
            border: none;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .action-btn .number {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .action-btn i {
            font-size: 20px;
            min-width: 20px;
            text-align: center;
            transition: 0.2s;
        }

        .action-btn.liked i {
            color: var(--accent);
            animation: heartBeat 0.3s ease;
        }

        .action-btn.saved i {
            color: var(--accent);
        }

        .action-btn.reposted i {
            color: var(--accent-orange);
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.3); }
            60% { transform: scale(0.9); }
        }

        .action-btn.liked .number {
            color: var(--accent);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 0, 80, 0.3);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .comments-bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            height: 75%;
            background: var(--bg-card);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2100;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        .comments-bottom-sheet.open {
            bottom: 0;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 2px;
            margin: 8px auto;
            cursor: grab;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 15px;
            border-bottom: 1px solid var(--border);
        }

        .sheet-header h3 {
            font-size: 17px;
            font-weight: 700;
        }

        .close-sheet-btn {
            background: var(--bg-input);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .close-sheet-btn:active {
            background: var(--accent);
        }

        .comments-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            -webkit-overflow-scrolling: touch;
        }

        .comment-item {
            margin-bottom: 16px;
            animation: fadeInUp 0.3s ease;
        }

        .comment-main {
            display: flex;
            gap: 10px;
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
            background: var(--bg-input);
            padding: 10px 14px;
            border-radius: 18px;
            border-top-right-radius: 4px;
        }

        .comment-author {
            font-weight: 700;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .comment-text {
            font-size: 13px;
            margin-top: 3px;
            word-break: break-word;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .comment-image-preview {
            max-width: 120px;
            max-height: 120px;
            border-radius: 10px;
            margin-top: 6px;
            cursor: pointer;
        }

        .comment-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .comment-actions {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            padding-right: 46px;
        }

        .comment-action {
            cursor: pointer;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .comment-action:hover,
        .comment-action.liked {
            color: var(--accent);
        }

        .replies-container {
            margin-top: 8px;
            margin-right: 46px;
            border-right: 2px solid var(--accent);
            padding-right: 12px;
        }

        .reply-item {
            margin-bottom: 10px;
        }

        .reply-item .comment-content {
            background: var(--bg-card);
        }

        .show-replies-btn {
            color: var(--accent);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            padding-right: 46px;
            margin-top: 4px;
        }

        .comment-input-area {
            background: var(--bg-card);
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
            align-items: center;
        }

        .comment-input-area input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }

        .comment-input-area input:focus {
            border-color: var(--accent);
        }

        .input-icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .input-icon-btn:active {
            color: var(--accent);
            background: var(--bg-input);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .send-btn:active {
            transform: scale(0.95);
            background: #e00045;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .emoji-picker {
            position: absolute;
            bottom: 65px;
            right: 10px;
            background: var(--bg-card);
            border-radius: 15px;
            padding: 10px;
            width: 280px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 2200;
            flex-wrap: wrap;
            gap: 4px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        .emoji-picker.active {
            display: flex;
        }

        .emoji-option {
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .emoji-option:hover {
            background: var(--bg-input);
            transform: scale(1.2);
        }

        .share-bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            height: 55%;
            background: var(--bg-card);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2300;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        .share-bottom-sheet.open {
            bottom: 0;
        }

        .share-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 10px;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .share-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .social-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 10px;
        }

        .social-icon {
            width: 65px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .social-icon:active {
            transform: scale(0.9);
        }

        .social-icon .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            font-size: 24px;
            color: white;
            transition: 0.2s;
        }

        .social-icon span {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .social-icon.copy-link .icon-circle { background: var(--accent); }
        .social-icon.whatsapp .icon-circle { background: #25D366; }
        .social-icon.facebook .icon-circle { background: #1877F2; }
        .social-icon.twitter .icon-circle { background: #1DA1F2; }
        .social-icon.telegram .icon-circle { background: #0088CC; }
        .social-icon.instagram .icon-circle { background: #E4405F; }
        .social-icon.email .icon-circle { background: #666; }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 3000;
            animation: toastIn 0.3s ease;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(255, 0, 80, 0.4);
            font-family: 'Cairo', sans-serif;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 8px;
            border-top: 1px solid var(--border);
            z-index: 100;
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
        }

        .nav-item {
            background: none;
            border: none;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 12px;
            border-radius: 12px;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            position: relative;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item .nav-icon {
            font-size: 22px;
            transition: 0.2s;
        }

        .nav-item .nav-label {
            font-size: 10px;
            font-weight: 600;
        }

        .double-tap-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 80px;
            color: white;
            z-index: 50;
            pointer-events: none;
            animation: doubleTapHeart 0.8s ease forwards;
            text-shadow: 0 0 40px rgba(255, 0, 80, 0.8);
        }

        @keyframes doubleTapHeart {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.8);
                opacity: 0;
            }
        }

        .infinite-loader {
            text-align: center;
            padding: 24px;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--bg-input);
            border-top: 3px solid var(--accent);
            border-right: 3px solid var(--text-primary);
            border-bottom: 3px solid var(--accent);
            border-left: 3px solid var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            font-weight: 600;
        }

        @media (min-width: 600px) {
            .feed-container {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
                min-height: 100vh;
            }
        }

        @media (max-width: 360px) {
            .action-btn {
                padding: 6px 8px;
                gap: 4px;
                font-size: 11px;
            }
            .action-btn i {
                font-size: 17px;
            }
            .action-btn .number {
                font-size: 10px;
            }
        }
    </style>
</head>

    <script src="common.js"></script>
    <script>
        // ==================== المتغيرات العامة ====================
        let currentUser = null;
        let feedPosts = [];
        let hasMore = true;
        let isLoading = false;
        let lastCursor = null;
        let currentFeedMode = 'following';
        let currentCommentPostId = null;
        let replyingToCommentId = null;
        let tempImage = null;
        let currentSharePostId = null;
        let longPressTimer = null;
        let stories = [];
        let followingSet = new Set();
        let currentStoryIndex = 0;
        let storyTimer = null;
        let storyProgressInterval = null;

        // ==================== دوال مساعدة ====================
        function showToast(msg, duration = 2500) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function addRipple(e, element) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'الآن';
            if (seconds < 3600) return Math.floor(seconds / 60) + ' دقائق';
            if (seconds < 86400) return Math.floor(seconds / 3600) + ' ساعات';
            if (seconds < 604800) return Math.floor(seconds / 86400) + ' أيام';
            return new Date(date).toLocaleDateString('ar');
        }

        function formatNumberShort(num) {
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function navigateTo(url) {
            document.body.style.opacity = '0.6';
            document.body.style.transition = 'opacity 0.15s ease';
            setTimeout(() => {
                window.location.href = url;
            }, 150);
        }

        // ==================== وظائف المتابعة ====================
        async function toggleFollow(userId, buttonElement) {
            if (!currentUser) {
                showToast('يرجى تسجيل الدخول أولاً');
                return;
            }
            const isFollowing = followingSet.has(userId);
            if (!isFollowing) {
                const { error } = await supabase.from('follows').insert({
                    follower_id: currentUser.id,
                    following_id: userId
                });
                if (error) {
                    showToast('فشل في المتابعة');
                    return;
                }
                followingSet.add(userId);
                if (buttonElement) {
                    buttonElement.textContent = 'متابَع';
                    buttonElement.classList.add('following');
                }
                const { data: user } = await supabase.from('users').select('username').eq('id', userId).single();
                const userName = user ? user.username : 'المستخدم';
                showToast(`لقد تابعت ${userName} ✅`);
            } else {
                const { error } = await supabase
                    .from('follows')
                    .delete()
                    .eq('follower_id', currentUser.id)
                    .eq('following_id', userId);
                if (error) {
                    showToast('فشل في إلغاء المتابعة');
                    return;
                }
                followingSet.delete(userId);
                if (buttonElement) {
                    buttonElement.textContent = 'تابع';
                    buttonElement.classList.remove('following');
                }
                const { data: user } = await supabase.from('users').select('username').eq('id', userId).single();
                const userName = user ? user.username : 'المستخدم';
                showToast(`تم إلغاء متابعة ${userName} ❌`);
            }
        }

        // ==================== جلب التغذية ====================
        async function fetchFeedPage(limit = 10) {
            if (!currentUser) return [];
            let query = supabase
                .from('posts')
                .select('*, users:author_id (id, username, avatar, verified)')
                .eq('hidden', false);

            if (currentFeedMode === 'following') {
                const { data: follows } = await supabase
                    .from('follows')
                    .select('following_id')
                    .eq('follower_id', currentUser.id);
                const followingIds = follows ? follows.map(f => f.following_id) : [];
                if (followingIds.length === 0) {
                    hasMore = false;
                    return [];
                }
                query = query.in('author_id', followingIds);
            }

            query = query.order('created_at', { ascending: false });
            if (lastCursor) query = query.lt('created_at', lastCursor);

            const { data, error } = await query.limit(limit);
            if (error) { console.error(error); return []; }
            if (!data || data.length < limit) hasMore = false;
            if (data && data.length) lastCursor = data[data.length - 1].created_at;

            return (data || []).map(p => ({
                id: p.id,
                title: p.title,
                content: p.content,
                image: p.image,
                author_id: p.author_id,
                author_name: p.users?.username || p.author_name || 'مستخدم',
                author_avatar: p.users?.avatar || 'https://randomuser.me/api/portraits/lego/' + (Math.floor(Math.random() * 8) + 1) + '.jpg',
                created_at: p.created_at,
                likes_count: p.likes_count || 0,
                comments_count: p.comments_count || 0,
                views_count: p.views_count || 0,
                reposts_count: p.reposts_count || 0,
                favorites_count: p.favorites_count || 0,
                hashtag: p.hashtag,
                category: p.category || 'عام',
                verified: p.users?.verified || false
            }));
        }

        async function refreshFeed() {
            lastCursor = null;
            hasMore = true;
            feedPosts = [];
            const posts = await fetchFeedPage(10);
            feedPosts = posts;
            renderFeedPage(posts, false);
            document.getElementById('infiniteLoader').style.display = hasMore ? 'flex' : 'none';
        }

        async function loadMore() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            document.getElementById('infiniteLoader').style.display = 'flex';
            const newPosts = await fetchFeedPage(10);
            if (newPosts.length) {
                feedPosts.push(...newPosts);
                renderFeedPage(newPosts, true);
            }
            isLoading = false;
            document.getElementById('infiniteLoader').style.display = hasMore ? 'flex' : 'none';
        }

        // ==================== عرض المنشورات ====================
        async function renderFeedPage(posts, append = false) {
            const container = document.getElementById('feedContainer');
            if (!posts.length && !append) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-newspaper"></i>
                        <p>${currentFeedMode === 'following' ? 'لا توجد منشورات من متابَعين. تابع المزيد من الأشخاص!' : 'لا توجد منشورات بعد'}</p>
                        <p style="font-size:12px;color:var(--text-muted);">${currentFeedMode === 'following' ? 'استكشف محتوى جديد!' : 'كن أول من ينشر!'}</p>
                    </div>`;
                return;
            }

            let html = '';
            for (let p of posts) {
                const fullContent = p.content || '';
                const shortContent = fullContent.length > 150 ? fullContent.substring(0, 150) + '...' : fullContent;
                const showMore = fullContent.length > 150;
                const isFollowing = followingSet.has(p.author_id);

                html += `
                <div class="post-card" data-id="${p.id}" id="post-${p.id}">
                    <div class="post-header">
                        <img class="author-avatar" src="${p.author_avatar}" alt="${escapeHtml(p.author_name)}" loading="lazy" onclick="event.stopPropagation(); navigateTo('public-profile.html?user=${p.author_id}')">
                        <div class="author-info">
                            <div class="author-name-row">
                                <span class="author-name" onclick="event.stopPropagation(); navigateTo('public-profile.html?user=${p.author_id}')">${escapeHtml(p.author_name)}</span>
                                ${p.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                                ${currentUser && p.author_id !== currentUser.id ? `
                                <button class="follow-btn ${isFollowing ? 'following' : ''}" data-user-id="${p.author_id}" onclick="event.stopPropagation(); toggleFollow('${p.author_id}', this)">
                                    ${isFollowing ? 'متابَع' : 'تابع'}
                                </button>` : ''}
                            </div>
                            <div class="post-date">${timeAgo(p.created_at)}</div>
                        </div>
                        <button class="post-menu-btn" onclick="event.stopPropagation(); showPostMenu('${p.id}')">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                    </div>
                    ${p.image ? `<img class="post-image" src="${p.image}" alt="صورة المنشور" loading="lazy" ondblclick="doubleTapLike('${p.id}', this)" onclick="openFullscreen('${p.id}')">` : ''}
                    <div class="post-content">
                        <div class="post-title">
                            ${escapeHtml(p.title)} 
                            <span class="category-badge" onclick="event.stopPropagation(); navigateTo('search.html?q=${encodeURIComponent(p.category || 'عام')}')">
                                ${escapeHtml(p.category || 'عام')}
                            </span>
                        </div>
                        <div class="post-text" id="post-text-${p.id}">${escapeHtml(shortContent)}</div>
                        ${showMore ? `<span class="more-btn" onclick="toggleFullText('${p.id}')" id="more-btn-${p.id}">...عرض المزيد</span>` : ''}
                        ${p.hashtag ? `<div class="hashtag" onclick="navigateTo('search.html?q=${encodeURIComponent(p.hashtag)}')">#${escapeHtml(p.hashtag)}</div>` : ''}
                    </div>
                    <div class="actions-bar">
                        <button class="action-btn like-btn" data-id="${p.id}" onclick="handleLike(this, event)">
                            <span class="number">${formatNumberShort(p.likes_count)}</span>
                            <i class="far fa-heart"></i>
                        </button>
                        <button class="action-btn comment-btn" data-id="${p.id}" onclick="openComments('${p.id}')">
                            <span class="number">${formatNumberShort(p.comments_count)}</span>
                            <i class="far fa-comment"></i>
                        </button>
                        <button class="action-btn share-btn" data-id="${p.id}" 
                                onclick="handleRepost(this, event)" 
                                oncontextmenu="event.preventDefault(); openShareAdvanced('${p.id}')"
                                onmousedown="startLongPress(event, '${p.id}')"
                                onmouseup="cancelLongPress()"
                                onmouseleave="cancelLongPress()"
                                ontouchstart="startLongPress(event, '${p.id}')"
                                ontouchend="cancelLongPress()">
                            <span class="number">${formatNumberShort(p.reposts_count)}</span>
                            <i class="far fa-share-square"></i>
                        </button>
                        <button class="action-btn save-btn" data-id="${p.id}" onclick="handleSave(this, event)">
                            <span class="number">${formatNumberShort(p.favorites_count)}</span>
                            <i class="far fa-bookmark"></i>
                        </button>
                        <button class="action-btn views-btn" data-id="${p.id}" disabled style="opacity:0.9; cursor:default;">
                            <span class="number">${formatNumberShort(p.views_count)}</span>
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>`;
            }

            if (append) {
                container.insertAdjacentHTML('beforeend', html);
            } else {
                container.innerHTML = html;
            }

            document.querySelectorAll('.follow-btn').forEach(btn => {
                const userId = btn.dataset.userId;
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleFollow(userId, this);
                });
            });

            setupIntersectionObserver();
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const postId = entry.target.dataset.id;
                        if (postId) {
                            const viewedKey = `viewed_${currentUser?.id}_${postId}`;
                            if (!localStorage.getItem(viewedKey) && !entry.target.dataset.viewed) {
                                entry.target.dataset.viewed = 'true';
                                localStorage.setItem(viewedKey, 'true');
                                recordView(postId);
                            }
                        }
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.post-card').forEach(card => {
                observer.observe(card);
            });
        }

        // ==================== إجراءات المنشورات ====================
        async function handleLike(btn, event) {
            if (!currentUser) { showToast('يرجى تسجيل الدخول أولاً'); return; }
            if (event) addRipple(event, btn);

            const postId = btn.dataset.id;
            const isLiked = btn.classList.contains('liked');
            const countSpan = btn.querySelector('.number');
            let current = parseInt(countSpan.innerText.replace(/[^0-9]/g, '')) || 0;
            const icon = btn.querySelector('i');

            if (!isLiked) {
                btn.classList.add('liked');
                icon.className = 'fas fa-heart';
                countSpan.innerText = formatNumberShort(current + 1);
                try {
                    await supabase.from('likes').insert({ user_id: currentUser.id, post_id: postId });
                    await supabase.rpc('increment_likes', { row_id: postId });
                } catch (e) {}
                showToast('❤️ تم الإعجاب');
            } else {
                btn.classList.remove('liked');
                icon.className = 'far fa-heart';
                countSpan.innerText = formatNumberShort(Math.max(0, current - 1));
                try {
                    await supabase.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', postId);
                    await supabase.rpc('decrement_likes', { row_id: postId });
                } catch (e) {}
            }
        }

        async function recordView(postId) {
            if (!postId || !currentUser) return;
            const viewedKey = `viewed_${currentUser.id}_${postId}`;
            if (localStorage.getItem(viewedKey)) return;
            try {
                const { data, error } = await supabase.rpc('increment_views', { row_id: postId });
                if (error) {
                    await fallbackIncrementViews(postId);
                } else {
                    await updateViewCounterFromDB(postId);
                }
                localStorage.setItem(viewedKey, 'true');
                const card = document.getElementById('post-' + postId);
                if (card) card.dataset.viewed = 'true';
            } catch (err) {
                try {
                    await fallbackIncrementViews(postId);
                    localStorage.setItem(viewedKey, 'true');
                } catch (fallbackErr) {
                    console.error('فشل في تسجيل المشاهدة:', fallbackErr);
                }
            }
        }

        async function fallbackIncrementViews(postId) {
            const { data: post, error } = await supabase
                .from('posts')
                .select('views_count')
                .eq('id', postId)
                .single();
            if (error) throw error;
            const newCount = (post?.views_count || 0) + 1;
            const { error: updateError } = await supabase
                .from('posts')
                .update({ views_count: newCount })
                .eq('id', postId);
            if (updateError) throw updateError;
            updateViewCounterDOM(postId, newCount);
            const postInFeed = feedPosts.find(p => p.id === postId);
            if (postInFeed) postInFeed.views_count = newCount;
        }

        async function updateViewCounterFromDB(postId) {
            const { data: post, error } = await supabase
                .from('posts')
                .select('views_count')
                .eq('id', postId)
                .single();
            if (error || !post) return;
            updateViewCounterDOM(postId, post.views_count);
            const postInFeed = feedPosts.find(p => p.id === postId);
            if (postInFeed) postInFeed.views_count = post.views_count;
        }

        function updateViewCounterDOM(postId, count) {
            const viewsBtn = document.querySelector(`.views-btn[data-id="${postId}"] .number`);
            if (viewsBtn) {
                viewsBtn.innerText = formatNumberShort(count || 0);
            }
        }

        function shareOnPlatform(platform) {
            const url = `https://ramz-x.com/post/${currentSharePostId}`;
            const post = feedPosts.find(p => p.id === currentSharePostId);
            const text = post ? post.title : 'منشور رائع على Ramz-X';

            const shareUrls = {
                whatsapp: `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
                twitter: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
                telegram: `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`,
            };

            if (platform === 'copy') {
                navigator.clipboard.writeText(url).then(() => showToast('🔗 تم نسخ الرابط'));
            } else if (platform === 'email') {
                window.location.href = `mailto:?subject=${encodeURIComponent(text)}&body=${encodeURIComponent(url)}`;
            } else if (shareUrls[platform]) {
                window.open(shareUrls[platform], '_blank', 'width=600,height=400');

                showToast(`📤 تمت المشاركة عبر ${platform}`);

            closeShareSheet();

        // ==================== القصص (في الشريط العلوي) ====================
        function openStoryCamera() {
            const choice = prompt('اختر الكاميرا:\n1. خلفية (افتراضي)\n2. أمامية');
            let capture = 'environment';
            if (choice === '2') capture = 'user';

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*';
            input.setAttribute('capture', capture);
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                showToast('📸 جاري رفع القصة...');
                const url = await uploadFile(file, 'stories');
                if (url) {
                    const expires = new Date(Date.now() + 86400000).toISOString();
                    const { error } = await supabase.from('stories').insert({
                        user_id: currentUser.id,
                        media_url: url,
                        text: '',
                        expires_at: expires,
                        created_at: new Date().toISOString()
                    });
                    if (error) {
                        showToast('فشل في نشر القصة');
                    } else {
                        showToast('✨ تم نشر قصتك!');
                        loadStories();
                    }
                }
            };
            input.click();
        }

        async function uploadFile(file, folder = 'stories') {
            if (!file) return null;
            const ext = file.name.split('.').pop();
            const fileName = `${folder}_${Date.now()}_${Math.random().toString(36)}.${ext}`;
            const { data, error } = await supabase.storage.from('ramz-x-images').upload(`${folder}/${fileName}`, file);
            if (error) return null;
            const { data: { publicUrl } } = supabase.storage.from('ramz-x-images').getPublicUrl(`${folder}/${fileName}`);
            return publicUrl;
        }

        async function fetchStories() {
            const { data, error } = await supabase
                .from('stories')
                .select('*, users:user_id (id, username, avatar)')
                .gte('expires_at', new Date().toISOString())
                .order('created_at', { ascending: false });
            if (error) return [];
            return data;
        }

                        <div class="story-item" data-story-index="${index}" onclick="openStoryViewer(${index})">
                            <div class="story-ring">

                            </div>

            });

        function openStoryViewer(index) {
            if (stories.length === 0) return;
            currentStoryIndex = index;
            showCurrentStory();
            document.getElementById('storyViewerOverlay').classList.add('active');
            startStoryTimer();

        function showCurrentStory() {
            const story = stories[currentStoryIndex];
            if (!story) return;
            const container = document.getElementById('storyViewerContent');
            const isVideo = story.media_url && (story.media_url.endsWith('.mp4') || story.media_url.endsWith('.webm'));
            
            if (isVideo) {
                container.innerHTML = `<video src="${story.media_url}" autoplay muted playsinline style="max-width:90%;max-height:80vh;border-radius:12px;object-fit:contain;"></video>`;
                const video = container.querySelector('video');
                video.onended = () => nextStory();
                video.onerror = () => nextStory();
            } else {
                container.innerHTML = `<img src="${story.media_url}" style="max-width:90%;max-height:80vh;border-radius:12px;object-fit:contain;">`;
            }
            
            resetStoryProgress();
        }

        function resetStoryProgress() {
            const fill = document.getElementById('storyProgressFill');
            fill.style.transition = 'none';
            fill.style.width = '0%';
            setTimeout(() => {
                fill.style.transition = 'width 5s linear';
                fill.style.width = '100%';
            }, 50);
        }

        function startStoryTimer() {
            clearTimeout(storyTimer);
            storyTimer = setTimeout(() => {
                nextStory();
            }, 5000);
        }

        function nextStory() {
            if (currentStoryIndex < stories.length - 1) {
                currentStoryIndex++;
                showCurrentStory();
                startStoryTimer();
            } else {
                closeStoryViewer();
            }
        }

        function prevStory() {
            if (currentStoryIndex > 0) {
                currentStoryIndex--;
                showCurrentStory();
                startStoryTimer();
            }
        }

        function closeStoryViewer() {
            document.getElementById('storyViewerOverlay').classList.remove('active');
            document.getElementById('storyViewerContent').innerHTML = '';
            clearTimeout(storyTimer);
        }

        document.getElementById('storyViewerClose').addEventListener('click', closeStoryViewer);
        document.getElementById('storyViewerNext').addEventListener('click', nextStory);
        document.getElementById('storyViewerPrev').addEventListener('click', prevStory);
        document.getElementById('storyViewerOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeStoryViewer();
        });

        // ==================== تغيير وضع التغذية ====================
        document.querySelectorAll('.feed-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFeedMode = this.dataset.feed;
                refreshFeed();
            });
        });

        // ==================== أزرار الشريط السفلي ====================
        document.getElementById('navExplore').addEventListener('click', () => navigateTo('explore.html'));
        document.getElementById('navCreate').addEventListener('click', () => navigateTo('create-post.html'));
        document.getElementById('navInbox').addEventListener('click', () => navigateTo('inbox.html'));
        document.getElementById('navProfile').addEventListener('click', () => navigateTo('profile.html'));

        let homeClickTimer = null;
        document.getElementById('navHome').addEventListener('click', function(e) {
            if (window.scrollY === 0) {
                if (homeClickTimer) {
                    clearTimeout(homeClickTimer);
                    homeClickTimer = null;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setTimeout(() => location.reload(), 300);
                } else {
                    homeClickTimer = setTimeout(() => { homeClickTimer = null; }, 500);
                }
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // ==================== التهيئة النهائية ====================
        async function init() {
            const stored = localStorage.getItem('currentUser');
            if (stored) { try { currentUser = JSON.parse(stored); } catch (e) {} }
            if (!currentUser) { currentUser = await createGuestUser(); }

            if (currentUser) {
                const { data } = await supabase.from('follows').select('following_id').eq('follower_id', currentUser.id);
                if (data) data.forEach(f => followingSet.add(f.following_id));
            }

            await refreshFeed();
            loadStories();

            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) loadMore();
            });

            document.getElementById('darkModeToggle').addEventListener('click', () => {
                document.body.classList.toggle('light');
                const icon = document.querySelector('#darkModeToggle i');
                if (document.body.classList.contains('light')) {
                    icon.className = 'fas fa-sun';
                    localStorage.setItem('darkMode', 'false');
                } else {
                    icon.className = 'fas fa-moon';
                    localStorage.setItem('darkMode', 'true');
                }
            });

            if (localStorage.getItem('darkMode') === 'false') {
                document.body.classList.add('light');
                document.querySelector('#darkModeToggle i').className = 'fas fa-sun';
            }

            document.getElementById('closeSheetBtn').addEventListener('click', () => {
                document.getElementById('commentsSheet').classList.remove('open');
            });
            document.getElementById('closeShareSheetBtn').addEventListener('click', closeShareSheet);

            document.getElementById('sendCommentBtn').addEventListener('click', addComment);
            document.getElementById('newCommentInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addComment();
            });

            document.getElementById('attachImageBtn').addEventListener('click', () => {
                document.getElementById('imageUpload').click();
            });
            document.getElementById('imageUpload').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { tempImage = ev.target.result; showToast('📷 تم اختيار صورة'); };
                    reader.readAsDataURL(file);
                }
            });

            const emojis = ['😀', '😂', '😍', '🔥', '👍', '🎉', '❤️', '😢', '😡', '🤔', '💪', '✨', '🌟', '👏', '🙏', '💯', '🎵', '📸', '💡', '🚀'];
            const picker = document.getElementById('emojiPicker');
            emojis.forEach(e => {
                const span = document.createElement('span');
                span.className = 'emoji-option';
                span.textContent = e;
                span.addEventListener('click', () => {
                    document.getElementById('newCommentInput').value += e;
                    picker.classList.remove('active');
                    document.getElementById('newCommentInput').focus();
                });
                picker.appendChild(span);
            });
            document.getElementById('emojiBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                picker.classList.toggle('active');
            });

            document.querySelectorAll('.social-icon').forEach(icon => {
                icon.addEventListener('click', () => shareOnPlatform(icon.dataset.platform));
            });

            document.querySelectorAll('#shareAdvancedSheet .tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#shareAdvancedSheet .tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('#shareAdvancedSheet .tab-pane').forEach(p => p.classList.remove('active'));
                    const target = document.getElementById(btn.dataset.tab);
                    if (target) target.classList.add('active');
                });
            });

            document.getElementById('commentsSheet').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('open');
            });
            document.getElementById('shareAdvancedSheet').addEventListener('click', function(e) {
                if (e.target === this) closeShareSheet();
            });

            console.log('🚀 Ramz-X Home - مع شريط ستوري علوي وتنقل سلس');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
